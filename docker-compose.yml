services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://fitness:${DB_PASSWORD}@db:5432/fitness_rewards
      - SECRET_KEY=${SECRET_KEY}
      - STRAVA_CLIENT_ID=${STRAVA_CLIENT_ID:-}
      - STRAVA_CLIENT_SECRET=${STRAVA_CLIENT_SECRET:-}
      - POLAR_CLIENT_ID=${POLAR_CLIENT_ID:-}
      - POLAR_CLIENT_SECRET=${POLAR_CLIENT_SECRET:-}
      - BASE_URL=https://fitness.littlefake.com
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=fitness
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=fitness_rewards
    volumes:
      - fitness_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitness_rewards"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  fitness_db_data:
